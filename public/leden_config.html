<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>Leden beheer</title>

<link href="/css/WTC.css" rel="stylesheet">

<style>
body {
    font-family: Arial;
    background:#C2D5F3;
}

.container {
    max-width:1120px;
    margin:30px auto;
    background:#fff;
    padding:18px;
    border-radius:14px;
}

table input[type="text"] {
    border: none !important;
    background: transparent;
    outline: none;
    width: 100%;
    padding: 2px 4px;
    margin: 0;
    font-size: 12px;
    font-family: Arial, sans-serif;
    box-sizing: border-box;
}

.toolbar{
    display:flex;
    justify-content:space-between;
    gap:8px;
    align-items:center;
    flex-wrap:wrap;
    margin: 4px 0 12px;
}
.toolbar .spacer{ flex:1; }
</style>


</head>

<body>

<div class="container">

    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0;">Leden Beheer</h2>
        <img src="images/Logo.png" width="40" height="40">
    </div>

    <div class="toolbar" style="margin-top:20px;">
        <button type="button" id="exportBtn" class="wtc-button">Export</button>
        <div class="spacer"></div>
        <a href="/leden.html?overlay=1" class="wtc-button">⏪Terug</a>
        <a href="/index.html" class="wtc-button">🏡Home</a>
        <a href="/logout.html" class="wtc-button">Uitloggen</a>
    </div>

    <table border="1" cellspacing="0" cellpadding="2" style="width:100%;border-collapse:collapse;">
        <thead>
            <tr style="background:#e2e8f0;">
                <th>Naam</th>
                <th>E-mail</th>
                <th>Telefoon</th>
                <th>Gemeente</th>
                <th>Adres</th>
                <th>Acties</th>
            </tr>
        </thead>
        <tbody id="ledenRows"></tbody>
    </table>

</div>

<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

const db = createClient(
    "https://orvjhbtoxjqhedsgnxqp.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ydmpoYnRveGpxaGVkc2dueHFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODY3MzAsImV4cCI6MjA5MDE2MjczMH0.vj8rJ3vazRjdz6OvJ5cZuFCuQS--G3Z8PcRuQEkdZQU"
);

// ... rest van je code



// =====================================
//  EXCELJS VIA ESM (NIET GEBLOKKEERD)
// =====================================
import ExcelJS from "https://esm.sh/exceljs";

// =====================================
//  LADEN VAN LEDEN
// =====================================
async function loadLeden() {
    const { data: leden, error } = await db
        .from("leden")
        .select("*")
        .order("naam");

    if (error) {
        alert("Fout bij laden leden: " + error.message);
        return;
    }

    const tbody = document.getElementById("ledenRows");
    tbody.innerHTML = "";

    leden.forEach(lid => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td><input value="${lid.naam || ""}" data-field="naam"></td>
            <td>${lid.email}</td>
            <td><input value="${lid.telefoon || ""}" data-field="telefoon"></td>
            <td><input value="${lid.gemeente || ""}" data-field="gemeente"></td>
            <td><input value="${lid.adres || ""}" data-field="adres"></td>
            <td>
                <button class="wtc-button updateBtn">Update</button>
                <button class="wtc-button wtc-delete deleteBtn">Delete</button>
            </td>
        `;

        // UPDATE
        tr.querySelector(".updateBtn").onclick = async () => {
            const inputs = tr.querySelectorAll("input");
            const updates = {};

            inputs.forEach(inp => {
                updates[inp.dataset.field] = inp.value;
            });

            const { error } = await db
                .from("leden")
                .update(updates)
                .eq("id", lid.id);

            if (error) alert("Fout bij update: " + error.message);
            else alert("Lid bijgewerkt ✔️");
        };

        // DELETE
        tr.querySelector(".deleteBtn").onclick = async () => {
            if (!confirm("Verwijderen?")) return;

            const { error } = await db
                .from("leden")
                .delete()
                .eq("id", lid.id);

            if (error) alert("Fout bij verwijderen: " + error.message);
            else tr.remove();
        };

        tbody.appendChild(tr);
    });
}

// =====================================
//  EXCEL EXPORT
// =====================================
document.getElementById("exportBtn").onclick = async () => {
    const { data: leden, error } = await db
        .from("leden")
        .select("*")
        .order("naam");

    if (error) {
        alert("Fout bij export: " + error.message);
        return;
    }

    const wb = new ExcelJS.Workbook();
    const ws = wb.addWorksheet("Leden");

    ws.addRow(["Naam", "Email", "Telefoon", "Gemeente", "Adres"]);

    leden.forEach(lid => {
        ws.addRow([
            lid.naam || "",
            lid.email || "",
            lid.telefoon || "",
            lid.gemeente || "",
            lid.adres || ""
        ]);
    });

    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], {
        type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
    });

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "leden.xlsx";
    a.click();
};

loadLeden();

</script>


</body>
</html>
