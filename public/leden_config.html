<script>
// =====================================
//  LADEN VAN LEDEN UIT SUPABASE VIA NODE
// =====================================
async function loadLeden() {
    const res = await fetch("/api/Leden");
    const tbody = document.getElementById("ledenRows");

    if (!res.ok) {
        tbody.innerHTML = "<tr><td colspan='6'>Geen toegang of fout.</td></tr>";
        return;
    }

    const leden = await res.json();
    tbody.innerHTML = "";

    leden.forEach(lid => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${lid.naam || ""}</td>
            <td>${lid.email || ""}</td>
            <td>${lid.telefoon || ""}</td>
            <td>${lid.gemeente || ""}</td>
            <td>${lid.adres || ""}</td>
            <td></td>
        `;

        tbody.appendChild(tr);
    });
}

loadLeden();
</script>
