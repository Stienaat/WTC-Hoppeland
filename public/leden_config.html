<script>
// =====================================
//  LADEN VAN LEDEN UIT SUPABASE VIA NODE
// =====================================
async function loadLeden() {
  const res = await fetch("/api/leden");
  const leden = await res.json();

  const tbody = document.querySelector("#ledenTable tbody");
  tbody.innerHTML = "";

  leden.forEach(lid => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td><input value="${lid.naam || ""}" data-field="naam"></td>
      <td><input value="${lid.telefoon || ""}" data-field="telefoon"></td>
      <td><input value="${lid.gemeente || ""}" data-field="gemeente"></td>
      <td><input value="${lid.adres || ""}" data-field="adres"></td>
      <td>
        <button class="updateBtn">Update</button>
        <button class="deleteBtn">Delete</button>
      </td>
    `;

    // Update
    tr.querySelector(".updateBtn").onclick = async () => {
      const inputs = tr.querySelectorAll("input");
      const updates = {};

      inputs.forEach(inp => {
        updates[inp.dataset.field] = inp.value;
      });

      await fetch(`/api/leden/${lid.id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(updates)
      });

      alert("Lid bijgewerkt");
    };

    // Delete
    tr.querySelector(".deleteBtn").onclick = async () => {
      if (!confirm("Verwijderen?")) return;

      await fetch(`/api/leden/${lid.id}`, { method: "DELETE" });
      tr.remove();
    };

    tbody.appendChild(tr);
  });
}

loadLeden();

</script>
