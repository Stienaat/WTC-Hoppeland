<script>

// ===============================
//  CLICK HANDLERS LEDEN-ADMIN
// ===============================

document.addEventListener('click', async (e) => {   

// UPDATE
    if (e.target.classList.contains('changeSignup')) {
        const naam = e.target.dataset.naam || '';

        const ok = await showConfirm(`Inschrijving van '${naam}' bijwerken ❓`);
        if (!ok) return;

        const formId = e.target.dataset.formid;
        const form = document.getElementById(formId);
        if (form) form.submit();
    }

// DELETE
    if (e.target.classList.contains('deleteSignup')) {
        const naam   = e.target.dataset.naam || '';
        const formId = e.target.dataset.formid;

        const ok = await showConfirm(`${naam} verwijderen? ❓`);
        if (!ok) return;

        const form = document.getElementById(formId);
        if (form) form.submit();
    }
});

// EXPORT
	document.getElementById('exportBtn').onclick = () => {
		const eventId = "<?= htmlspecialchars($eventId) ?>";
		if (!eventId) return;
		window.location = "signups_export.php?event_id=" + encodeURIComponent(eventId);
		
		setTimeout(() => { 
			showAlert("success", "Bestand is aangemaakt ✔️");     // SERVER-SIDE MESSAGE
		}, 500);
};
	
</script>

<script>
	const params = new URLSearchParams(window.location.search);
	const msg = params.get("msg");

	if (msg) {
		showAlert("success", msg);
	}
</script>
