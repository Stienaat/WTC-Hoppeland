<!doctype html>
<html lang="nl">
<head>
    <meta charset="utf-8">
    <title>Beheer – Inschrijvingen & betalingen</title>

    <link href="/css/WTC.css" rel="stylesheet">
   
    <style>
        .toolbar {
            display:flex;
            justify-content:space-between;
            gap:8px;
            align-items:center;
            flex-wrap:wrap;
            margin: 4px 0 12px;
        }
        .toolbar .spacer { flex:1; }
        input[type="text"] {
            border:0;
            background:transparent;
            outline:none;
            width:100%;
        }
    </style>

    <script>
        window.wtcAlertPosition = { top: "8%", left: "60%" };
        window.wtcAlertStyle = {
            confirm: { color: "#333", background: "rgba(255, 209, 156, 0.8)" },
            success: { color: "#0A0", background: "rgba(200, 255, 200, 0.8)" },
            error:   { color: "#A00", background: "rgba(255, 200, 200, 0.8)" },
            info:    { color: "#0044AA", background: "rgba(200, 220, 255, 0.8)" }
        };
    </script>
</head>

<body style="font-family:Arial;background:#C2D5F3;">

<div style="max-width:1120px;margin:30px auto;background:#fff;padding:18px;border-radius:14px;">
    <div style="display:flex; justify-content:space-between; align-items:center; width:100%;">
        <h2 style="margin:0;">Beheer / Inschrijvingen.</h2>
        <img src="images/Logo.jpg" id="hoplogo" alt="" width="40" height="40">
    </div>

    <div class="toolbar" style="margin-top:20px;">
		<select id="adminEventSelect"></select>
        <button type="button" id="exportBtn" class="wtc-button">Export</button>
        <div class="spacer"></div>
		<input type="submit" id="BtnBack" class="wtc-button" onclick="window.location.href='./index.html?overlay=1';return false;"
		name="Form"  value="⏪Terug">
		<input type="submit" id="BtnBack" class="wtc-button" onclick="window.location.href='./index.html';return false;"
		name="Form"  value="🏡Home">
		<button id="btnLogout" class="wtc-button">Uitloggen</button>

    </div>
	<h4 id="selectedEventTitle" style="margin:5px 0 8px;color:#37C5E4;">
	  Geen event gekozen
	</h4>
    <table id="signupTable" border="1" cellspacing="0" cellpadding="2"
           style="width:100%;border-collapse:collapse;">
        <thead>
            <tr style="background:#e2e8f0;">
                <th>Naam</th>
                <th>E-mail</th>
                <th>Betaald</th>
                <th>Methode</th>
                <th>Referentie</th>
                <th>Ingeschreven op</th>
                <th>Acties</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<div id="app-modal" class="modal hidden">
    <div class="modal-content">
        <h3 id="modal-title"></h3>

        <div id="hoplog" style="position:absolute;left:270px;top:11px;width:45px;height:45px;z-index:2;">
            <img src="images/Logo.png" id="hoplogo" alt="" width="45" height="45">
        </div>

        <p id="modal-message"></p>

        <div id="modal-buttons" style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
            <!-- Knoppen worden dynamisch ingevuld -->
        </div>
    </div>
</div>

<script src="js/modal.js"></script>
<script src="js/signups2.js?v=2"></script>

</body>
</html>
