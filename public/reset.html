<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Paswoord resetten</title>
</head>
<body>
  <input type="password" id="newPass" placeholder="Nieuw paswoord">
  <button id="btnReset">Opslaan</button>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabase = window.supabase.createClient(
    "https://orvjhbtoxjqhedsgnxqp.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ydmpoYnRveGpxaGVkc2dueHFwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1ODY3MzAsImV4cCI6MjA5MDE2MjczMH0.vj8rJ3vazRjdz6OvJ5cZuFCuQS--G3Z8PcRuQEkdZQU"
  );
</script>
  <script>
    document.getElementById("btnReset").addEventListener("click", async () => {
      const password = document.getElementById("newPass").value.trim();

      if (!password) {
        alert("Geef een nieuw paswoord in.");
        return;
      }

      const { error } = await supabase.auth.updateUser({
        password: password
      });

      if (error) {
        alert("Reset mislukt.");
        return;
      }

      alert("Paswoord gewijzigd.");
      window.location.href = "/leden.html";
    });
  </script>

</body>
