<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Paswoord resetten</title>
</head>
<body>
  <input type="password" id="newPass" placeholder="Nieuw paswoord">
  <button id="btnReset">Opslaan</button>

  <script>
    document.getElementById("btnReset").addEventListener("click", async () => {
      const token = new URLSearchParams(window.location.search).get("token");
      const password = document.getElementById("newPass").value.trim();

      if (!token) {
        alert("Resetlink ontbreekt.");
        return;
      }

      if (password.length < 6) {
        alert("Paswoord moet minstens 6 tekens zijn.");
        return;
      }

      const res = await fetch("/reset-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, password })
      });

      const j = await res.json();

      if (!j.ok) {
        alert(j.error || "Reset mislukt.");
        return;
      }

      alert("Paswoord gewijzigd.");
      window.location.href = "/leden.html";
    });
  </script>
</body>
</html>
