<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Boek – Rooster</title>
	<link rel="stylesheet" href="css/kalender.css">
    <link rel="stylesheet" href="css/WTC.css">
</head>

<body>
<div class="kalenderHeader">
 
    <div id="weekRange"></div>
</div>
<script>
    const email = localStorage.getItem("user_email");
    const isAdmin = localStorage.getItem("is_admin") === "true";

    if (!email && !isAdmin) {
        window.location.href = "index.html?msg=notknown";
    }
</script>

  <div class="rooster">
    <div class="toolbar">
      <button type="button" id="btnPrev" class="wtc-button">← week</button>
      <button type="button" id="btnToday" class="wtc-button">vandaag</button>
      <button type="button" id="btnNext" class="wtc-button">week →</button>
      <p style="color:GREEN">Welkom beste, <strong id="headerUserName"></strong>
      </p>
      <div class="spacer"></div>
      <div class="weekLabel" id="weekLabel"></div>
      <input type="submit" id="BtnBack" class="wtc-button" name="Form"  value="⏪Terug">
      <img src="images/Logo.png" width="50" height="50">
    </div>
    <div id="gridScroll" class="gridScroll">
      <div id="grid" class="grid" role="grid" aria-label="Weekkalender"></div>
    </div>
  </div>
  
  <!-- EVENT DIALOG -->
  <dialog id="eventDialog">
    <form id="eventForm">
      <div class="dialog-header">
        <!-- Sluiten -->
        <button id="btnCloseTop" type="button" class="wtc-button">Sluiten</button>
        <!-- Admin-only -->
        <menu id="adminActions" >
          <button id="btnSave" type="button" class="wtc-button">Opslaan</button>
          <button id="btnDelete" type="button" class="wtc-button">Verwijderen</button>
        </menu>
      </div>
      <div class="dialog-content">
        <div id="eventDialogBody">
          <label for="fInfo">Info</label>
          <textarea id="fInfo" rows="5"></textarea>
        </div>
        <div id="memberActions"></div>
      </div>
      <button type="submit" style="display:none"></button>
    </form>
  </dialog>

<!-- alert -->

<div id="app-modal" class="modal hidden">
    <div class="modal-content">
        <h3 id="modal-title"></h3>
        <div id="hoplog" style="position:absolute;left:270px;top:10px;width:45px;height:45px;z-index: 30001;">
            <img src="images/Logo.png" id="hoplogo" alt="" width="45" height="45">
        </div>
        <p id="modal-message"></p>
        <div id="modal-buttons" style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
            <!-- Knoppen worden dynamisch ingevuld -->
        </div>
    </div>
</div>

<script>  

document.getElementById("BtnBack").onclick = () => {
  localStorage.removeItem("user_email");
  CURRENT_USER = null;

  window.location.href = "index.html";
};
</script>

	<script src="js/qrcode.min.js"></script>
	<script src="js/kalender.js"></script>
	<script src="js/modal.js"></script>

</body>
</html>
