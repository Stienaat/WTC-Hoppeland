<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clubroutes</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Leaflet GPX -->
<script src="https://unpkg.com/leaflet-gpx@1.7.0/gpx.js"></script>

<!-- Leaflet Draw -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css">
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<div id="app-modal" class="modal hidden">
    <div class="modal-content">
        <h3 id="modal-title"></h3>

        <div id="hoplog" style="position:absolute;left:270px;top:11px;width:45px;height:45px;z-index:2;">
            <img src="./images/Logo.png" id="hoplogo" alt="" width="45" height="45">
        </div>

        <p id="modal-message"></p>

        <div id="modal-buttons" style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
            <!-- Knoppen worden dynamisch ingevuld -->
        </div>
    </div>
</div>

<script src="/js/modal.js"></script>
<link href="/css/WTC.css" rel="stylesheet">
<link href="/css/ritten.css" rel="stylesheet">

</head>

<body>

<div class="controls">

  <h2 style="margin:5px;">Fietsroutes</h2>
  <label>Groep:
	<select id="groepSelect" class="wtc-select">
      <option value="ALL">Alle</option>
	</select>
  </label>

  <label>Zoek:
    <input id="zoekInput" type="search" placeholder="bv. Poperinge, Kemmel..." class="wtc-select">
  </label>	
	<button type="button" id="wisBtn" class="wtc-button" onclick="wisRoute()">Wis route</button>
	<a href="/leden.html" class="wtc-button" style="padding: 4px 5px 4px 5px">&larr; Terug</a>
	<div id="routeUserBadge" style="margin-left:auto;font-weight:600;"></div>
</div>

<div class="container">
	
  <div id="map"></div>
  <div id="list">routes</div>
</div>

<script src="/js/ritten.js"></script>

</body>
</html>
