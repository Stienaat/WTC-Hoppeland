<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>Leden Dashboard</title>
  <link href="WTC.css" rel="stylesheet">
</head>

<body style="text-indent: 1em;font-family:Arial;background:#D1FED5;">

<script>
// 1) Email ophalen uit localStorage (van login)
const email = localStorage.getItem("email");
if (!email) {
  window.location.href = "leden.html?msg=notknown";
}

// 2) Lidgegevens ophalen via server
async function loadLid() {
  const res = await fetch(`/me?email=${encodeURIComponent(email)}`);
  const data = await res.json();

  if (!data.ok) {
    alert("Kon gegevens niet laden.");
    return;
  }

  const lid = data.user;

  document.getElementById("naam").textContent = lid.naam;
  document.getElementById("email").textContent = lid.email;
  document.getElementById("adres").textContent = lid.adres;
  document.getElementById("gemeente").textContent = lid.gemeente;
  document.getElementById("telefoon").textContent = lid.telefoon;
}

loadLid();
</script>
